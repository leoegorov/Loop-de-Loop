<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Loop de Loop</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="mode-playpause">

  <div id="startOverlay" class="overlay">
    <button id="startBtn" type="button">Enable Mic &amp; Audio</button>
    <p id="startError" class="error"></p>
  </div>

  <header id="toolbar">
    <select id="modeSelect" aria-label="Editing mode">
      <option value="playpause">▶ Play / Pause (P)</option>
      <option value="playrec">● Play / Rec (R)</option>
      <option value="initdel">✚ Init / Delete (I)</option>
      <option value="offset">◐ Offset (O)</option>
      <option value="speed">◎ Speed (S)</option>
      <option value="volume">▮ Volume (V)</option>
      <option value="copypaste">⧉ Copy / Paste (C)</option>
      <option value="zoom">⤢ Zoom (Z)</option>
    </select>

    <div id="fileButtons">
      <button id="exportBtn" type="button" title="Export project + audio">Export</button>
      <button id="importBtn" type="button" title="Import project + audio">Import</button>
      <input id="importInput" type="file" accept="application/json" hidden>
    </div>
  </header>

  <main id="grid" role="list"></main>

  <div id="zoomLayer" hidden></div>

  <script type="module" src="app.js"></script>
</body>
</html>
