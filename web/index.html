<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loop-de-Loop</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="title">Loop-de-Loop</div>
        <div id="status" class="status">Idle</div>
      </div>

      <div class="actions">
        <button id="addModuleBtn" class="btn">Add loop</button>
        <button id="exportBtn" class="btn">Export</button>
        <button id="importBtn" class="btn">Import</button>
        <input id="importFile" class="file" type="file" accept="application/json" />
      </div>
    </header>

    <main>
      <div id="modules" class="modules"></div>
    </main>

    <template id="moduleTemplate">
      <section class="module">
        <div class="moduleHeader">
          <div class="moduleTitle">Loop</div>
          <button class="btn danger deleteBtn">Delete</button>
        </div>

        <div class="moduleBody">
          <div class="transport">
            <div class="ringWrap">
              <svg class="ring" viewBox="0 0 120 120" aria-hidden="true">
                <circle class="ringBase" cx="60" cy="60" r="48" />
                <circle class="ringProg" cx="60" cy="60" r="48" />
                <circle class="ringDot" cx="60" cy="12" r="4" />
              </svg>
              <button class="mainBtn" type="button">REC</button>
            </div>

            <div class="mixer">
              <input class="vol" type="range" min="0" max="1" step="0.01" value="0.9" orient="vertical" />
              <div class="volLabel">Vol</div>
            </div>
          </div>

          <button class="btn stopBtn" type="button">Stop</button>
        </div>
      </section>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
