<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LOOPING — software loop station</title>
<script>
/* Audio worklet and microphone only exist on secure origins — bounce
   plain-http visitors (e.g. via an old redirect) to https. */
if (location.protocol === 'http:' && !/^(localhost|127\.|\[?::1)/.test(location.hostname)) {
  location.replace('https:' + location.href.slice(5));
}
</script>
<link rel="stylesheet" href="css/style.css?v=29">
</head>
<body>

<div id="power-overlay">
  <div class="power-box">
    <svg class="power-logo" viewBox="0 0 106 48" role="img" aria-label="LOOPING logo">
      <defs>
        <linearGradient id="power-logo-grad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#1663c7"/>
          <stop offset="1" stop-color="#48a7f0"/>
        </linearGradient>
      </defs>
      <path d="M14 24 C14 10, 41 10, 53 24 C65 38, 92 38, 92 24 C92 10, 65 10, 53 24 C41 38, 14 38, 14 24 Z"
            fill="none" stroke="url(#power-logo-grad)" stroke-width="7.5" stroke-linecap="round"/>
      <polyline points="22,24 27,24 30,18 34,31 37,21 39,24 44,24"
                fill="none" stroke="url(#power-logo-grad)" stroke-width="2.2"
                stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="62,24 67,24 70,18 74,31 77,21 79,24 84,24"
                fill="none" stroke="url(#power-logo-grad)" stroke-width="2.2"
                stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h1>LOOPING</h1>
    <p>Software loop station — unlimited loop channels, per-channel FX.</p>
    <button id="power-btn">POWER ON</button>
    <p class="hint">Grants microphone access. Use Chrome or Edge.</p>
    <p id="power-msg"></p>
  </div>
</div>

<header id="topbar" class="hidden">
  <div class="brand">
    <svg class="logo" viewBox="0 0 106 48" role="img" aria-label="LOOPING logo">
      <defs>
        <linearGradient id="logo-grad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#1663c7"/>
          <stop offset="1" stop-color="#48a7f0"/>
        </linearGradient>
      </defs>
      <path d="M14 24 C14 10, 41 10, 53 24 C65 38, 92 38, 92 24 C92 10, 65 10, 53 24 C41 38, 14 38, 14 24 Z"
            fill="none" stroke="url(#logo-grad)" stroke-width="7.5" stroke-linecap="round"/>
      <polyline points="22,24 27,24 30,18 34,31 37,21 39,24 44,24"
                fill="none" stroke="url(#logo-grad)" stroke-width="2.2"
                stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="62,24 67,24 70,18 74,31 77,21 79,24 84,24"
                fill="none" stroke="url(#logo-grad)" stroke-width="2.2"
                stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>LOOPING</span>
  </div>

  <div class="tb-group">
    <label>BPM</label>
    <input type="number" id="bpm-input" min="40" max="240" step="0.1" value="120">
    <div id="beat-led" title="Beat"></div>
  </div>

  <div class="tb-group">
    <label>Quantize</label>
    <select id="quantize-select">
      <option value="bar" selected>Bar</option>
      <option value="beat">Beat</option>
      <option value="off">Off</option>
    </select>
  </div>

  <div class="tb-group">
    <label class="chk"><input type="checkbox" id="first-loop-tempo" checked> 1st loop sets tempo</label>
  </div>

  <div class="tb-group">
    <label class="chk" title="On close: trim leading silence (free-length loops) and crossfade the loop seam so it never clicks"><input type="checkbox" id="perfect-loops" checked> Perfect loops</label>
  </div>

  <div class="tb-group">
    <label>Audio in</label>
    <select id="input-select"></select>
    <label class="chk"><input type="checkbox" id="monitor-toggle"> Monitor</label>
  </div>

  <div class="tb-group">
    <label>Comp</label>
    <input type="number" id="comp-input" min="0" max="200" step="1" value="0" title="Overdub latency compensation (ms)">
    <span class="unit">ms</span>
    <button id="calibrate-btn" title="Auto-calibrate latency: plays test clicks and measures the round trip. Patch your interface output to its input (loopback), or place the mic close to the speaker.">CAL</button>
  </div>

  <div class="tb-group">
    <label>Master</label>
    <input type="range" id="master-vol" min="0" max="1.5" step="0.01" value="1">
  </div>

  <div class="tb-group buttons">
    <button id="playall-btn" data-mappable="global:playAll" title="Resume all stopped loops together (P)">PLAY ALL</button>
    <button id="stopall-btn" data-mappable="global:stopAll">STOP ALL</button>
    <button id="export-btn" data-mappable="global:exportLoops" title="Download all loops as a zip of WAV stems">EXPORT</button>
    <button id="import-btn" title="Load loops from an exported zip or loose .wav files">IMPORT</button>
    <input type="file" id="import-file" accept=".zip,.wav" multiple style="display:none">
    <button id="reset-btn" title="Clear all loops, unlock tempo, stop clock">RESET</button>
  </div>
</header>

<main id="channels" class="hidden"></main>

<div id="add-loop-tools" class="hidden">
  <button id="add-channel" data-mappable="global:addChannel" title="Add a new audio loop channel (N)">+ ADD AUDIO LOOP</button>
</div>

<footer id="statusbar" class="hidden">
  <span id="status-text">Ready.</span>
  <span class="keys">Keys: 1-9 = loop button · Shift+1-9 = stop · N = add loop · P = play all · Space = stop all</span>
</footer>

<script src="js/vendor/pitch-shift.js?v=29"></script>
<script src="js/vendor/encode-wav.js?v=29"></script>
<script src="js/effects.js?v=29"></script>
<script src="js/engine.js?v=29"></script>
<script src="js/export.js?v=29"></script>
<script src="js/import.js?v=29"></script>
<script src="js/editor.js?v=29"></script>
<script src="js/app.js?v=29"></script>
</body>
</html>
